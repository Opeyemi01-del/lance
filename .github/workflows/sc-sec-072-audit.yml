# .github/workflows/sc-sec-072-audit.yml
#
# SC-SEC-072: Contract audit CI
#
# Jobs:
#   1. build-and-size-check  — compiles to WASM and asserts size < 40 KB
#   2. unit-tests            — runs all Soroban unit tests including
#                              reentrancy and address-poisoning suites
#   3. gas-benchmarks        — runs gas assertion tests and uploads report

name: SC-SEC-072 Contract Audit

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/sc-sec-072-audit.yml'
  pull_request:
    paths:
      - 'contracts/**'

env:
  RUST_TOOLCHAIN: "1.81.0"
  CARGO_TERM_COLOR: always

jobs:
  # ── Job 1: Build + WASM size check ─────────────────────────────────────────
  build-and-size-check:
    name: Build WASM & verify size < 40 KB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build escrow contract (release)
        run: |
          cargo build \
            --target wasm32-unknown-unknown \
            --release \
            -p escrow

      - name: Assert WASM binary size < 40 KB
        run: |
          WASM_PATH="target/wasm32-unknown-unknown/release/escrow.wasm"
          SIZE=$(wc -c < "$WASM_PATH")
          echo "escrow.wasm size: ${SIZE} bytes"
          if [ "$SIZE" -gt 40960 ]; then
            echo "ERROR: WASM binary (${SIZE} bytes) exceeds 40 KB limit"
            exit 1
          fi
          echo "OK: ${SIZE} bytes ≤ 40 960 bytes"

      - name: Build reputation + job_registry (release)
        run: |
          cargo build \
            --target wasm32-unknown-unknown \
            --release \
            -p reputation \
            -p job_registry

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32-unknown-unknown/release/*.wasm

  # ── Job 2: Unit tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Soroban unit tests (address poisoning + reentrancy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run escrow contract tests
        run: |
          cargo test -p escrow -- --nocapture 2>&1 | tee test_output.txt

      - name: Verify reentrancy tests ran
        run: |
          grep -q "reentrancy_guard_panics_on_second_entry" test_output.txt || \
            (echo "ERROR: reentrancy test not found in output" && exit 1)
          grep -q "poisoned_address_detected" test_output.txt || \
            (echo "ERROR: address poisoning test not found in output" && exit 1)
          echo "All required security tests confirmed in output."

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test_output.txt

  # ── Job 3: Gas benchmarks ─────────────────────────────────────────────────────
  gas-benchmarks:
    name: Gas benchmark assertions (≥15% reduction)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run gas benchmark tests
        run: |
          cargo test -p escrow gas_ -- --nocapture 2>&1 | tee gas_report.txt

      - name: Check all gas assertions passed
        run: |
          if grep -q "FAILED" gas_report.txt; then
            echo "ERROR: One or more gas budget assertions failed"
            cat gas_report.txt
            exit 1
          fi
          echo "All gas benchmarks passed."

      - name: Upload gas report
        uses: actions/upload-artifact@v4
        with:
          name: gas-report
          path: gas_report.txt